name: validate-plugin

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run plugin validator (structure + tool-manifest policy)
        run: python3 plugins/tipi/scripts/validate_plugin.py

      - name: Run tipi test suite (contract drift guard)
        env:
          TIPI_VAULT_ROOT: /tmp/ci-vault
        run: |
          cd plugins/tipi/tipi
          python3 -m venv .venv
          .venv/bin/pip install --quiet --upgrade pip
          .venv/bin/pip install --quiet -e '.[dev]'
          .venv/bin/pytest tests/ -v
